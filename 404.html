<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <meta name="robots" content="noindex,nofollow" />
    <!-- Preconnect to target origin to initiate early DNS, TCP, and TLS negotiations, reducing redirect latency -->
    <link rel="preconnect" href="https://akhielesh.com" />
    <script>
      const TARGET_ORIGIN = "https://akhielesh.com";
      const LEGACY_BASE = "/Akhielesh";

      const current = new URL(window.location.href);
      const nextPath = current.pathname.startsWith(LEGACY_BASE)
        ? current.pathname.slice(LEGACY_BASE.length) || "/"
        : current.pathname || "/";

      const nextUrl = new URL(nextPath, TARGET_ORIGIN);
      nextUrl.search = current.search;
      nextUrl.hash = current.hash;

      window.location.replace(nextUrl.href);
    </script>
  </head>
  <body></body>
</html>
