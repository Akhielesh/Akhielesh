<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <meta name="robots" content="noindex,nofollow" />
    <!-- ⚡ Bolt: Preconnect to target origin to eliminate DNS/TCP/TLS handshake latency during redirect -->
    <link rel="preconnect" href="https://akhielesh.com" />
    <script>
      const TARGET_ORIGIN = "https://akhielesh.com";
      const LEGACY_BASE = "/Akhielesh";

      const current = new URL(window.location.href);
      const nextPath = current.pathname.startsWith(LEGACY_BASE)
        ? current.pathname.slice(LEGACY_BASE.length) || "/"
        : current.pathname || "/";

      const nextUrl = new URL(
        `${nextPath}${current.search}${current.hash}`,
        TARGET_ORIGIN,
      );

      window.location.replace(nextUrl.href);
    </script>
  </head>
  <body></body>
</html>
