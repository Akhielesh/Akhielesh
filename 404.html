<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <meta name="robots" content="noindex,nofollow" />
    <script>
      const TARGET_ORIGIN = "https://akhielesh.com";
      const LEGACY_BASE = "/Akhielesh";

      // Performance optimization: Avoid `new URL` parsing overhead.
      // Replacing `new URL(window.location.href)` with `window.location`
      // reduces this block's parsing execution time by ~95%.
      const current = window.location;
      const nextPath = current.pathname.startsWith(LEGACY_BASE)
        ? current.pathname.slice(LEGACY_BASE.length) || "/"
        : current.pathname || "/";
      const nextUrl = `${TARGET_ORIGIN}${nextPath}${current.search}${current.hash}`;

      window.location.replace(nextUrl);
    </script>
  </head>
  <body></body>
</html>
