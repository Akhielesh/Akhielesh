name: Deploy portfolio to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Resolve Cloudflare site settings
        id: cf
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        shell: bash
        run: |
          project_name="${CLOUDFLARE_PAGES_PROJECT:-akhielesh-portfolio}"

          if [[ -n "${SITE_URL}" ]]; then
            site_url="${SITE_URL%/}"
          else
            site_url="https://${project_name}.pages.dev"
          fi

          echo "project_name=${project_name}" >> "$GITHUB_OUTPUT"
          echo "site_url=${site_url}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify static export
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: ${{ steps.cf.outputs.site_url }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy ./out --project-name "${{ steps.cf.outputs.project_name }}" --branch "${{ github.ref_name }}"
